# Eventovivo Redis baseline for the single-host production phase.
# Keep queue safety above cache aggressiveness. Logical DB separation does not
# isolate eviction policy, so the instance stays on noeviction.
# Authentication is intentionally not versioned here. If Redis stops being a
# strict localhost-only service, apply password or ACL via a local override.

bind 127.0.0.1 ::1
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

maxmemory-policy noeviction
