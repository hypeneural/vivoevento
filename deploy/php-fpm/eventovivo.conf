[eventovivo]
user = www-data
group = www-data

listen = /run/php/php8.3-fpm-eventovivo.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
; Baseline for the first production pass. Revisit after load tests.
pm.max_children = 28
pm.start_servers = 6
pm.min_spare_servers = 4
pm.max_spare_servers = 10
pm.max_requests = 500

request_terminate_timeout = 120s
request_slowlog_timeout = 5s
slowlog = /var/log/php8.3-fpm-eventovivo-slow.log

php_admin_value[error_log] = /var/log/php8.3-fpm-eventovivo-error.log
php_admin_flag[log_errors] = on

php_value[upload_max_filesize] = 64M
php_value[post_max_size] = 64M
php_value[memory_limit] = 512M
php_value[max_execution_time] = 120
php_value[max_input_time] = 120
php_value[date.timezone] = America/Sao_Paulo
