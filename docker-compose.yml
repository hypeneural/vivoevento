services:
  # ─── PostgreSQL ───────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: eventovivo-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-eventovivo}
      POSTGRES_USER: ${DB_USERNAME:-eventovivo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-eventovivo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eventovivo-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible storage) ───────────────────
  minio:
    image: minio/minio:latest
    container_name: eventovivo-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-eventovivo}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-secret123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── MinIO Bucket Init ───────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: eventovivo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set ev http://minio:9000 ${MINIO_ACCESS_KEY:-eventovivo} ${MINIO_SECRET_KEY:-secret123};
      mc mb ev/eventovivo-media --ignore-existing;
      mc mb ev/eventovivo-media-public --ignore-existing;
      mc mb ev/eventovivo-media-private --ignore-existing;
      mc mb ev/eventovivo-ai-private --ignore-existing;
      mc mb ev/eventovivo-temp --ignore-existing;
      mc anonymous set download ev/eventovivo-media;
      mc anonymous set download ev/eventovivo-media-public;
      exit 0;
      "

  # ─── Mailpit (dev email) ─────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: eventovivo-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_HTTP_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
