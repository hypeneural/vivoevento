<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Evento Vivo icon</title>
  <desc id="desc">Gradient icon for the Evento Vivo admin panel.</desc>
  <defs>
    <linearGradient id="bg" x1="6" y1="4" x2="58" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#171b37" />
      <stop offset="0.56" stop-color="#1f2250" />
      <stop offset="1" stop-color="#0f172a" />
    </linearGradient>
